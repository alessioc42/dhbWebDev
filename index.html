<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
    <title>Math Duel</title>
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      (function () {
        function activeGameFromHash(hash) {
          var parts = String(hash || "#/").replace(/^#\/?/, "").split("/").filter(Boolean);
          var first = (parts[0] || "").toLowerCase();
          if (first === "sumgame") return "sumGame";
          return "home";
        }

        function syncShellFromHash() {
          var hash = location.hash;
          if (!hash || hash === "#") {
            location.replace("#/");
            hash = "#/";
          }
          document.documentElement.dataset.activeGame = activeGameFromHash(hash);
        }

        syncShellFromHash();
        window.addEventListener("hashchange", syncShellFromHash);
      })();
    </script>
  </head>
  <body>
    <main id="app">
      <section id="homeScreen" class="page" data-screen="home">
        <header class="page-head">
          <h1 class="page-title">Math Duel</h1>
          <p class="meta">Choose a game mode.</p>
        </header>
        <nav class="stack">
          <a class="nav-link" href="#/sumGame/lobby">Rechenrennen</a>
          <a class="nav-link" href="src/zehneruebergang/index.html">Zehnerübergang</a>
        </nav>
      </section>

      <div id="sumGameApp">
        <section id="lobbyScreen" class="page" data-screen="lobby">
          <header class="page-head">
            <a class="btn btn-back" href="#/">Zurück zu den Spielen</a>
            <h1 class="page-title">Mathe-Duell</h1>
            <p id="lobbyStatus" class="status status--idle" hidden></p>
          </header>

          <div class="page-body stack">
            <label class="field">
              <span class="field-label">Name</span>
              <input class="field-input" id="usernameInput" name="username" autocomplete="nickname" />
            </label>

            <form id="createLobbyForm" class="panel stack">
              <h2 class="panel-title">Lobby erstellen</h2>
              <label class="field">
                <div class="field-range__head">
                  <span class="field-label">Runden</span>
                  <output class="field-range__value" id="roundsValue" for="roundsInput">5</output>
                </div>
                <input
                  class="styled-slider"
                  id="roundsInput"
                  name="rounds"
                  type="range"
                  min="3"
                  max="10"
                  value="5"
                />
              </label>
              <label class="field">
                <span class="field-label">Schwierigkeit</span>
                <select class="field-input" id="difficultyInput" name="difficulty">
                  <option value="easy">Leicht (0–30)</option>
                  <option value="medium" selected>Mittel (0–70)</option>
                  <option value="hard">Schwer (0–100)</option>
                  <option value="expert">Experte (−100–100)</option>
                </select>
              </label>
              <button class="btn btn-primary" id="createLobbySubmit" type="submit" disabled>Lobby erstellen</button>
            </form>

            <form id="joinLobbyForm" class="panel stack">
              <h2 class="panel-title">Lobby beitreten</h2>
              <label class="field">
                <span class="field-label">Code</span>
                <input
                  class="field-input"
                  id="joinCodeInput"
                  name="code"
                  maxlength="4"
                  autocapitalize="characters"
                  autocomplete="off"
                  inputmode="text"
                  pattern="[A-Za-z]{4}"
                  spellcheck="false"
                  aria-describedby="joinCodeHint"
                />
                <span class="field-hint" id="joinCodeHint">Vier Buchstaben (A–Z).</span>
              </label>
              <button class="btn btn-primary" id="joinLobbySubmit" type="submit" disabled>Beitreten</button>
            </form>

            <div class="nav-actions">
              <button id="openHighscoresFromLobby" class="btn btn-secondary" type="button">Bestenliste</button>
            </div>
          </div>
        </section>

        <section id="gameScreen" class="page" data-screen="game">
          <header class="page-head">
            <h1 class="page-title">Spiel</h1>
            <p id="gameLobbyCode" class="meta">Keine Lobby verbunden.</p>
            <p id="gameStatus" class="status status--idle" hidden></p>
          </header>

          <div class="page-body stack">
            <section class="game-play stack">
              <div id="roundTimeline" class="round-timeline" role="list" aria-label="Rundenverlauf" hidden></div>
              <div id="gameTargetNumber" class="play-info status status--idle" hidden></div>
              <div id="optionList" class="option-grid option-grid--rect"></div>
              <div id="equationChain" class="equation-chain" hidden>
                <div id="equationExpr" class="equation-chain__expr" role="group" aria-label="Deine Rechnung">
                  <span
                    class="equation-piece equation-block equation-block--term equation-block--placeholder"
                    aria-hidden="true"
                  >0</span>
                </div>
              </div>
            </section>

            <section class="game-scoreboard stack">
              <h2 class="section-title">Punktestand</h2>
              <ul id="scoreboardList" class="scoreboard" role="list" aria-label="Punktestand"></ul>
            </section>

            <div class="nav-actions">
              <button id="leaveLobbyButton" class="btn btn-back" type="button">Lobby verlassen</button>
              <button id="openHighscoresFromGame" class="btn btn-secondary" type="button">Bestenliste</button>
            </div>
          </div>
        </section>

        <section id="highscoreScreen" class="page" data-screen="highscores">
          <header class="page-head">
            <button id="backToLobbyButton" class="btn btn-back" type="button">Zurück zur Lobby</button>
            <h1 class="page-title">Bestenliste</h1>
            <p id="highscoreStatus" class="status status--info" hidden></p>
          </header>
          <div class="highscore-table-wrap">
            <table class="highscore-table">
              <thead>
                <tr>
                  <th scope="col">Gespielt</th>
                  <th scope="col">Du</th>
                  <th scope="col">Gegner</th>
                  <th scope="col">Deine Punkte</th>
                  <th scope="col">Gegnerpunkte</th>
                  <th scope="col">Höchstpunktzahl</th>
                </tr>
              </thead>
              <tbody id="highscoreList"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script>
      window.GAME_SERVER_HOST = window.GAME_SERVER_HOST || window.location.origin;
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
